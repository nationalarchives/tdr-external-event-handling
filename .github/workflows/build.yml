name: TDR Tag and pre deploy
on:
  push:
    branches:
      - main

permissions: {}

jobs:
  pre-deploy:
    permissions: { contents: write, id-token: write }
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_build.yml@2d29c2e83fbaba6554c1e0d8c0b45d2015d610b2 # v0.0.41
    with:
      java-version: '17'
      lambda-name: external-events-handler
      repo-name: tdr-external-event-handling
      artifact-name: external-event-handling
      build-command: |
        sbt assembly
    secrets:
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
  deploy:
    permissions: { contents: write, id-token: write }
    needs: pre-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: gh workflow run deploy.yml -f environment=intg -f to-deploy=${NEXT_VERSION}
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          NEXT_VERSION: ${{ needs.pre-deploy.outputs.next-version }}
